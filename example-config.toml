[inbound]
watch_dir = "testData"


[[sinks]]
name = "local_json_archive"
type = "file"
config.output_path = "/data/archive/json-data/daq"
config.format = "jsonl" 
config.rotation = 'daily'

[[sinks]]
name = "local_csv_archive"
type = "file"
config.output_path = "/data/archive/csv-data/daq"
config.format = "csv" 
config.rotation = 'daily'

[[sinks]]
name = "mqtt_daemon"
type = "mqtt"

config.broker = "localhost"
config.port = 1883
[config.measurement_map]
    "temperature" = "daq/sensors/temp"
    "pressure" = "daq/sensors/pressure"
fallback_topic = "daq/unknown"
format = "line_protocol"
qos = 1
